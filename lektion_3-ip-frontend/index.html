<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What is my IP?</title>
  <style>

  </style>
</head>
<body>
  <h3>My public IP is <span id="ip"></span></h3>

  <script>
    const apiURL = "https://wdb-blomqeri-webbkommunikation-och-databaser.2.rahtiapp.fi/api/ip";
    async function getIp() {
      const res = await fetch(apiURL);
      const data = await res.json();

      console.log(data);
      document.getElementById("ip").textContent = data.client_host;
    } 
    getIp();
  </script>

</body>
</html>
