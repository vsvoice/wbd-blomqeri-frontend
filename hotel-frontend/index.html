<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

<body>
  <h3>Boka rum</h3>
  <div id="rooms-id"></div>

  <script>
    //const apiURL = "https://wdb-blomqeri-webbkommunikation-och-databaser.2.rahtiapp.fi/api/ip";
    const apiURL = "http://localhost:8080/rooms";
    async function getRooms() {
      const res = await fetch(apiURL);
      const rooms = await res.json();
      
      for (room of rooms) {
        document.getElementById("rooms-id").innerHTML += `
          <li>${room.number} – Våning: ${room.floor} – Sängar: ${room.beds} st</li>
        `
      }

      console.log(rooms);
    } 
    getRooms();
  </script>

</body>
</html>
